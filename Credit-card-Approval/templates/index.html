<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Risk Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 13px;
        }
        input, select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-submit {
            grid-column: span 2;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: scale(1.02);
        }
        .note {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
        }
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .btn-submit {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Credit Card Risk Predictor</h1>
        <p class="subtitle">Enter applicant details to predict if they are a 'good' or 'bad' client</p>
        
        <form action="/predict" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Gender</label>
                    <select name="CODE_GENDER" required>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Owns Car</label>
                    <select name="FLAG_OWN_CAR" required>
                        <option value="Y">Yes</option>
                        <option value="N">No</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Owns Property</label>
                    <select name="FLAG_OWN_REALTY" required>
                        <option value="Y">Yes</option>
                        <option value="N">No</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Number of Children</label>
                    <input type="number" name="CNT_CHILDREN" value="0" min="0" required>
                </div>
                
                <div class="form-group">
                    <label>Annual Income</label>
                    <input type="number" name="AMT_INCOME_TOTAL" value="270000" min="0" required>
                </div>
                
                <div class="form-group">
                    <label>Income Type</label>
                    <select name="NAME_INCOME_TYPE" required>
                        <option value="Working">Working</option>
                        <option value="Commercial associate">Commercial associate</option>
                        <option value="Pensioner">Pensioner</option>
                        <option value="State servant">State servant</option>
                        <option value="Student">Student</option>
                        <option value="Unemployed">Unemployed</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Education Level</label>
                    <select name="NAME_EDUCATION_TYPE" required>
                        <option value="Higher education">Higher education</option>
                        <option value="Secondary / secondary special">Secondary</option>
                        <option value="Incomplete higher">Incomplete higher</option>
                        <option value="Lower secondary">Lower secondary</option>
                        <option value="Academic degree">Academic degree</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Marital Status</label>
                    <select name="NAME_FAMILY_STATUS" required>
                        <option value="Married">Married</option>
                        <option value="Single / not married">Single</option>
                        <option value="Civil marriage">Civil marriage</option>
                        <option value="Separated">Separated</option>
                        <option value="Widow">Widow</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Housing Type</label>
                    <select name="NAME_HOUSING_TYPE" required>
                        <option value="House / apartment">House / apartment</option>
                        <option value="Rented apartment">Rented apartment</option>
                        <option value="With parents">With parents</option>
                        <option value="Municipal apartment">Municipal apartment</option>
                        <option value="Office apartment">Office apartment</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Age (years)</label>
                    <input type="number" name="AGE" value="35" min="18" max="80" required>
                </div>
                
                <div class="form-group">
                    <label>Employment Years</label>
                    <input type="number" name="EMPLOYMENT_YEARS" value="5" min="0" max="50" required>
                </div>
                
                <div class="form-group">
                    <label>Has Mobile Phone</label>
                    <select name="FLAG_MOBIL" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Has Work Phone</label>
                    <select name="FLAG_WORK_PHONE" required>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Has Phone</label>
                    <select name="FLAG_PHONE" required>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Has Email</label>
                    <select name="FLAG_EMAIL" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                
                <div class="form-group full-width">
                    <label>Occupation Type</label>
                    <select name="OCCUPATION_TYPE" required>
                        <option value="Sales staff">Sales staff</option>
                        <option value="Security staff">Security staff</option>
                        <option value="Core staff">Core staff</option>
                        <option value="Managers">Managers</option>
                        <option value="Drivers">Drivers</option>
                        <option value="High skill tech staff">High skill tech staff</option>
                        <option value="Waiters/barmen staff">Waiters/barmen</option>
                        <option value="Cleaning staff">Cleaning staff</option>
                        <option value="Realty agents">Realty agents</option>
                        <option value="Private service staff">Private service</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>
                
                <div class="form-group full-width">
                    <label>Family Members</label>
                    <input type="number" name="CNT_FAM_MEMBERS" value="2" min="1" max="10" required>
                </div>
                
                <button type="submit" class="btn-submit">🔮 Predict Risk</button>
            </div>
        </form>
        <p class="note">This prediction is for educational purposes only. Not financial advice.</p>
    </div>
</body>
</html>
